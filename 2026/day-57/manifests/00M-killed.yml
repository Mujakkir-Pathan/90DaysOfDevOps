apiVersion: v1
kind: Pod
metadata:
  name: killed
spec:
  containers:
  - name: stress
    image: polinux/stress
    resources:
      requests:
        memory: "56Mi"
        cpu: "50m"
      limits:
        memory: "100Mi"
        cpu: "100m"
    command: ["stress"]
    args: ["--vm", "1", "--vm-bytes", "200M", "--vm-hang", "1"]
